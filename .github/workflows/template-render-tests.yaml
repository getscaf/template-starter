name: Template Render Tests

on:
  push:
    branches: [main]
  pull_request:

jobs:
  render-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install copier
        run: pip install copier

      - name: Run render tests
        run: make test-template-render
