stages:
  - validate
{% if copier__enable_secret_scanning %}
  - security
{% endif %}
{% if copier__enable_semantic_release %}
  - release
{% endif %}

template_correctness:
  stage: validate
  image: python:3.11
  script:
    - pip install copier
    - copier copy . /tmp/{{ copier__template_sample_name }} --trust --defaults -d copier__project_name_raw="Sample Project" -d copier__project_slug="sample_project" -d copier__description="Sample generated project" -d copier__author_name="Sample Author" -d copier__email="sample@example.com" -d copier__version="0.1.0" -d copier__configure_repo=false -d copier__create_repo=false -d copier__ci_provider="gitlab" -d copier__enable_semantic_release={{ 'true' if copier__enable_semantic_release else 'false' }} -d copier__github_semantic_release_auth="{{ copier__github_semantic_release_auth }}" -d copier__enable_secret_scanning={{ 'true' if copier__enable_secret_scanning else 'false' }} -d copier__task_runner="{{ copier__task_runner }}"
    - test -f /tmp/{{ copier__template_sample_name }}/README.md

{% if copier__enable_secret_scanning %}
secret_scan:
  stage: security
  image: zricethezav/gitleaks:latest
  script:
    - gitleaks detect --source . --verbose --redact
{% endif %}

{% if copier__enable_semantic_release %}
semantic_release:
  stage: release
  image: node:lts
  script:
    - npm install
    - npx semantic-release
  rules:
    - if: '$CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH'
{% endif %}
